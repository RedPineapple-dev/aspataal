apiVersion: apps/v1
kind: Deployment
metadata:
  name: vitalwatch-frontend
  labels:
    app: vitalwatch-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vitalwatch-frontend
  template:
    metadata:
      labels:
        app: vitalwatch-frontend
    spec:
      containers:
        - name: vitalwatch-frontend
          image: vitalwatch-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_URL
              value: "http://localhost:30001"
